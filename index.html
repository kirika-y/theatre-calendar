function getActorPhoto(name) {
  try { return localStorage.getItem(`actor-photo-${name}`); } catch(e) { return null; }
}
function saveActorPhoto(name, dataUrl) {
  try { localStorage.setItem(`actor-photo-${name}`, dataUrl); } catch(e) {}
}
function removeActorPhoto(name) {
  try { localStorage.removeItem(`actor-photo-${name}`); } catch(e) {}
}

function formatSeat(f) {
  const parts = [f.seatFloor, f.seatBlock&&`${f.seatBlock}ブロック`, f.seatRow, f.seatNum&&`${f.seatNum}番`];
  return parts.filter(Boolean).join(" ");
}

// ── ActorPhoto ──
function ActorPhoto({ name }) {
  const [photo, setPhoto] = React.useState(()=>getActorPhoto(name));
  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      saveActorPhoto(name, ev.target.result);
      setPhoto(ev.target.result);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };
  const handleRemove = e => {
    e.stopPropagation();
    if (window.confirm("写真を削除しますか？")) {
      removeActorPhoto(name);
      setPhoto(null);
    }
  };
  return (
    <div style={{position:"relative",width:"64px",height:"64px"}}>
      <div style={{width:"64px",height:"64px",borderRadius:"50%",overflow:"hidden",
        border:"2px solid #5a4020",background:"#1a1408",
        display:"flex",alignItems:"center",justifyContent:"center"}}>
        {photo
          ? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          : <span style={{fontSize:"24px",color:"#5a4020"}}>🎭</span>
        }
      </div>
      <label style={{position:"absolute",bottom:0,right:0,width:"20px",height:"20px",
        borderRadius:"50%",background:"#3a2a10",border:"1px solid #8a6520",
        display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"10px"}}>
        📷<input type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
      </label>
      {photo&&<button onClick={handleRemove} style={{position:"absolute",top:0,right:0,width:"18px",height:"18px",
        borderRadius:"50%",background:"#3a0808",border:"1px solid #801818",
        color:"#e87060",cursor:"pointer",fontSize:"9px",padding:0,lineHeight:1}}>✕</button>}
    </div>
  );
}

function collectActors(shows) {
  const s = new Set();
  shows.forEach(show => (show.castTags||[]).forEach(n => n.trim() && s.add(n.trim())));
  return [...s].sort((a,b) => a.localeCompare(b, "ja"));
}

function exportToICS(show) {
  const et = EVENT_TYPES[show.eventType||"show"];
  const venue = show.venueType==="shiki" ? show.venueShiki : show.venueOther;
  const seat = formatSeat(show);
  const [y,m,d] = show.date.split("-").map(Number);
  const pad = n => String(n).padStart(2,"0");
  let dtStart, dtEnd;
  if (show.time) {
    const [hh,mm] = show.time.split(":").map(Number);
    dtStart = `${y}${pad(m)}${pad(d)}T${pad(hh)}${pad(mm)}00`;
    dtEnd   = `${y}${pad(m)}${pad(d)}T${pad(hh+2)}${pad(mm)}00`;
  } else {
    dtStart = `${y}${pad(m)}${pad(d)}`;
    dtEnd   = `${y}${pad(m)}${pad(d)}`;
  }
  const title = encodeURIComponent(`【${et.label}】${show.title}`);
  const details = encodeURIComponent([
    venue && `会場: ${venue}`,
    seat  && `座席: ${seat}`,
    (show.castTags||[]).length>0 && `出演: ${show.castTags.join("、")}`,
    show.memo && `感想: ${show.memo}`,
  ].filter(Boolean).join("\n"));
  const location = encodeURIComponent(venue||"");
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dtStart}/${dtEnd}&details=${details}&location=${location}`;
  window.open(url, "_blank");
}

function copyShow(show) {
  const et = EVENT_TYPES[show.eventType||"show"];
  const venue = show.venueType==="shiki" ? show.venueShiki : show.venueOther;
  const seat = formatSeat(show);
  const lines = [`【${et.label}】${show.title}`,
    `${show.date}${show.time?" "+show.time:""}${venue?" / "+venue:""}`,
    seat&&`座席: ${seat}`, (show.castTags||[]).length>0&&`出演: ${show.castTags.join("、")}`,
    show.memo&&`感想: ${show.memo}`].filter(Boolean);
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{
    const el = document.getElementById("copy-toast");
    if(el){ el.style.opacity="1"; setTimeout(()=>el.style.opacity="0",1500); }
  });
}

// ── StarRating ──
function StarRating({ value, onChange, readonly=false }) {
  return (
    <div style={{display:"flex",gap:"4px"}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={()=>!readonly&&onChange(s)}
          style={{cursor:readonly?"default":"pointer",fontSize:readonly?"14px":"22px",
            color:s<=value?"#e8c55a":"#3a2e1e",userSelect:"none"}}>★</span>
      ))}
    </div>
  );
}

// ── CastInput ──
function CastInput({ tags, onChange, allActors }) {
  const [input, setInput] = useState("");
  const [open, setOpen] = useState(false);
  const suggestions = input.trim()
    ? allActors.filter(a=>a.includes(input.trim())&&!tags.includes(a))
    : allActors.filter(a=>!tags.includes(a));
  const addTag = name => { const n=name.trim(); if(n&&!tags.includes(n)) onChange([...tags,n]); setInput(""); setOpen(false); };
  const removeTag = name => onChange(tags.filter(t=>t!==name));
  const handleKey = e => {
    if((e.key==="Enter"||e.key===",")&&input.trim()){ e.preventDefault(); addTag(input.replace(/,/g,"")); }
    else if(e.key==="Backspace"&&!input&&tags.length>0) removeTag(tags[tags.length-1]);
  };
  return (
    <div style={{position:"relative"}}>
      <div style={{minHeight:"38px",background:"#110d05",border:"1px solid #3a2e1e",borderRadius:"2px",
        padding:"4px 8px",display:"flex",flexWrap:"wrap",gap:"4px",alignItems:"center"}}
        onClick={()=>document.getElementById("cast-input-field")?.focus()}>
        {tags.map(name=>(
          <span key={name} style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"12px",
            color:"#e8c55a",background:"#2a1e08",border:"1px solid #5a4020",padding:"1px 8px",borderRadius:"10px"}}>
            {name}
            <span onClick={e=>{e.stopPropagation();removeTag(name);}} style={{cursor:"pointer",color:"#6a5030",fontSize:"11px"}}>✕</span>
          </span>
        ))}
        <input id="cast-input-field" value={input}
          onChange={e=>{setInput(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)}
          onKeyDown={handleKey} placeholder={tags.length===0?"名前を入力、Enterで追加":""}
          style={{flex:1,minWidth:"80px",background:"none",border:"none",outline:"none",
            color:"#d4b87a",fontSize:"13px",padding:"2px 0"}}/>
      </div>
      {open&&suggestions.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,
          background:"#1a1408",border:"1px solid #5a4020",borderTop:"none",maxHeight:"160px",overflowY:"auto"}}>
          {suggestions.slice(0,20).map(name=>(
            <div key={name} onMouseDown={e=>{e.preventDefault();addTag(name);}}
              style={{padding:"7px 12px",fontSize:"13px",color:"#e8c55a88",cursor:"pointer",borderBottom:"1px solid #2a2010"}}>
              {name}
            </div>
          ))}
        </div>
      )}
      <p style={{margin:"4px 0 0",fontSize:"10px",color:"#4a3820",letterSpacing:"1px"}}>Enter・カンマで追加 / 過去の記録から候補を表示</p>
    </div>
  );
}

// ── ShowCard ──
function ShowCard({ show, onEdit, onDelete, onActorClick, onDuplicate, cardMode=false }) {
  const isPast = new Date(show.date) < new Date(new Date().toDateString());
  const isToday = new Date(show.date).toDateString() === new Date().toDateString();
  const venue = show.venueType==="shiki" ? show.venueShiki : show.venueOther;
  const seat = formatSeat(show);
  const et = EVENT_TYPES[show.eventType||"show"];
  const isInfo = show.eventType && show.eventType !== "show";
  const btns = (
    <div style={{display:"flex",flexShrink:0,alignItems:"center"}}>
      <button onClick={()=>onDuplicate&&onDuplicate(show)} title="複製" style={{background:"none",border:"none",color:"#507050",cursor:"pointer",fontSize:"12px",padding:"0 4px"}}>+❐</button>
      <button onClick={()=>exportToICS(show)} title="カレンダーに追加" style={{background:"none",border:"none",color:"#305a80",cursor:"pointer",fontSize:"12px",padding:"0 4px"}}>📅</button>
      <button onClick={()=>copyShow(show)} title="コピー" style={{background:"none",border:"none",color:"#305a50",cursor:"pointer",fontSize:"12px",padding:"0 4px"}}>📋</button>
      <button onClick={()=>onEdit(show)} style={{background:"none",border:"none",color:"#4a3820",cursor:"pointer",fontSize:"12px",padding:"0 4px"}}>✎</button>
      <button onClick={()=>onDelete(show.id)} style={{background:"none",border:"none",color:"#4a3820",cursor:"pointer",fontSize:"12px",padding:"0 4px"}}>✕</button>
    </div>
  );
  if (!cardMode) {
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"8px 10px",gap:"8px",borderBottom:"1px solid #1e1a10",
        borderLeft:`3px solid ${et.color}`,background:isToday?`${et.color}11`:"transparent"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:"8px",minWidth:0,flex:1}}>
          <span style={{fontSize:"9px",padding:"1px 5px",flexShrink:0,
            background:et.bg,color:et.color,border:`1px solid ${et.border}`}}>{et.label}</span>
          {isToday&&<span style={{background:et.color,color:"#0d0900",fontSize:"8px",padding:"1px 5px",fontWeight:"700",flexShrink:0}}>TODAY</span>}
          <span style={{fontSize:"14px",fontWeight:"700",color:isPast?"#d4b870":et.textColor,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{show.title}</span>
          <span style={{fontSize:"12px",color:"#c0a050",flexShrink:0,whiteSpace:"nowrap"}}>
            {show.date}{show.time?` ${show.time}`:""}
          </span>
        </div>
        {btns}
      </div>
    );
  }
  return (
    <div style={{background:isInfo?"#0a0e14":isPast?"#191310":"#1c1608",
      border:`1px solid ${isToday?et.color:isPast?"#2a2218":et.border}`,
      borderRadius:"4px",padding:"12px 14px",position:"relative",
      borderLeft:`3px solid ${et.color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
        <span style={{fontSize:"9px",padding:"1px 6px",
          background:et.bg,color:et.color,border:`1px solid ${et.border}`}}>
          {et.label}{isToday&&" · TODAY"}
        </span>
        <div style={{display:"flex",gap:"2px",alignItems:"center"}}>
          {show.rating>0&&<StarRating value={show.rating} readonly/>}
          {btns}
        </div>
      </div>
      <div style={{opacity:isPast?0.85:1}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px",marginBottom:"6px"}}>
          <div style={{minWidth:0,flex:1}}>
            <span style={{fontSize:"9px",letterSpacing:"2px",color:"#b08838"}}>{show.genre}</span>
            <h3 style={{margin:"2px 0 0",fontSize:"15px",fontWeight:"700",
              color:isPast?"#e8c870":"#f5e080",letterSpacing:"0.5px",lineHeight:1.3}}>{show.title}</h3>
          </div>

        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:"6px"}}>
          <span style={{fontSize:"11px",color:"#c0a045"}}>{show.date}{show.time?` ${show.time}`:""}</span>
          {venue&&<span style={{fontSize:"12px",color:"#c8a848"}}>· {venue}</span>}
          {seat&&<span style={{fontSize:"10px",color:"#e8c55a",fontFamily:"monospace",
            background:"#140f04",padding:"0 5px",border:"1px solid #2a2010"}}>{seat}</span>}
          {(show.castTags||[]).map(name=>(
            <span key={name} onClick={e=>{e.stopPropagation();onActorClick&&onActorClick(name);}}
              style={{fontSize:"12px",color:"#d0aa50",fontStyle:"italic",
                cursor:onActorClick?"pointer":"default"}}>{name}</span>
          ))}
        </div>
        {show.memo&&(
          <p style={{margin:"6px 0 0",fontSize:"12px",color:"#c8a858",
            borderTop:"1px solid #221c10",paddingTop:"6px",fontStyle:"italic",lineHeight:1.5}}>
            "{show.memo}"
          </p>
        )}
      </div>
    </div>
  );
}

// ── Modal ──
function Modal({ show, onClose, onSave, allActors, allTitles }) {
  const [form, setForm] = useState(show ? {...show, castTags:show.castTags||[]} : {...emptyForm});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = {width:"100%",background:"#110d05",border:"1px solid #3a2e1e",borderRadius:"2px",
    color:"#d4b87a",padding:"8px 10px",fontSize:"13px",outline:"none",boxSizing:"border-box"};
  const lbl = {display:"block",fontSize:"10px",letterSpacing:"2px",color:"#6a5030",marginBottom:"4px",textTransform:"uppercase"};
  const canSave = form.title && form.date;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"16px"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"linear-gradient(160deg,#1a1408,#221808)",border:"1px solid #5a4520",
        borderRadius:"4px",padding:"24px",width:"100%",maxWidth:"520px",maxHeight:"92vh",overflowY:"auto",
        boxShadow:"0 20px 60px rgba(0,0,0,0.8)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}}>
          <h2 style={{margin:0,fontSize:"20px",color:"#e8c55a",letterSpacing:"2px"}}>{show?"公演を編集":"公演を追加"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#5a4520",fontSize:"18px",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gap:"14px"}}>
          <div>
            <label style={lbl}>種別</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px"}}>
              {Object.entries(EVENT_TYPES).map(([k,et])=>(
                <button key={k} onClick={()=>set("eventType",k)} style={{padding:"6px 0",textAlign:"center",
                  fontSize:"12px",cursor:"pointer",background:form.eventType===k?et.bg:"none",
                  border:`1px solid ${form.eventType===k?et.color:"#2a2010"}`,
                  color:form.eventType===k?et.color:"#5a4520"}}>{et.label}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>公演タイトル *</label>
            <input style={inp} value={form.title} onChange={e=>set("title",e.target.value)}
              placeholder="例: ライオンキング" list="title-suggestions"/>
            <datalist id="title-suggestions">
              {[...new Set([...SHIKI_PRESETS,...(allTitles||[])])].map(p=><option key={p} value={p}/>)}
            </datalist>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            <div><label style={lbl}>日付 *</label>
              <input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></div>
            <div><label style={lbl}>時間</label>
              <input type="time" style={inp} value={form.time} onChange={e=>set("time",e.target.value)}/></div>
          </div>
          <div><label style={lbl}>ジャンル</label>
            <select style={inp} value={form.genre} onChange={e=>set("genre",e.target.value)}>
              {GENRES.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>劇場・会場</label>
            <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
              {[["shiki","四季劇場"],["other","その他"]].map(([v,l])=>(
                <button key={v} onClick={()=>set("venueType",v)} style={{padding:"3px 12px",cursor:"pointer",
                  background:form.venueType===v?"#3a2a10":"none",fontSize:"11px",letterSpacing:"1px",
                  border:`1px solid ${form.venueType===v?"#8a6520":"#3a2e1e"}`,
                  color:form.venueType===v?"#e8c55a":"#6a5030"}}>{l}</button>
              ))}
            </div>
            {form.venueType==="shiki"
              ? <select style={inp} value={form.venueShiki} onChange={e=>set("venueShiki",e.target.value)}>
                  {SHIKI_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
              : <div>
                  <input style={inp} value={form.venueOther} onChange={e=>set("venueOther",e.target.value)}
                    placeholder="劇場名を入力" list="past-venues"/>
                  <datalist id="past-venues">
                    {[...new Set((allTitles?.__venues||[]))].map(v=><option key={v} value={v}/>)}
                  </datalist>
                </div>
            }
          </div>
          <div>
            <label style={lbl}>座席</label>
            <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr 1fr",gap:"8px"}}>
              <div><label style={{...lbl,marginBottom:"2px"}}>階</label>
                <select style={inp} value={form.seatFloor} onChange={e=>set("seatFloor",e.target.value)}>
                  <option value="">-</option><option>1階</option><option>2階</option><option>3階</option>
                </select></div>
              <div><label style={{...lbl,marginBottom:"2px"}}>ブロック</label>
                <select style={inp} value={form.seatBlock} onChange={e=>set("seatBlock",e.target.value)}>
                  <option value="">-</option><option>センター</option><option>左サイド</option><option>右サイド</option>
                </select></div>
              <div><label style={{...lbl,marginBottom:"2px"}}>列</label>
                <input style={inp} value={form.seatRow} onChange={e=>set("seatRow",e.target.value)} placeholder="K"/></div>
              <div><label style={{...lbl,marginBottom:"2px"}}>番号</label>
                <input style={inp} value={form.seatNum} onChange={e=>set("seatNum",e.target.value)} placeholder="24"/></div>
            </div>
          </div>
          <div><label style={lbl}>出演者</label>
            <CastInput tags={form.castTags||[]} onChange={tags=>set("castTags",tags)} allActors={allActors}/>
          </div>
          <div><label style={lbl}>感想メモ</label>
            <textarea style={{...inp,resize:"vertical",minHeight:"80px",lineHeight:1.7}}
              value={form.memo} onChange={e=>set("memo",e.target.value)} placeholder="感想、印象に残ったシーンなど..."/>
          </div>
        </div>
        <div style={{display:"flex",gap:"10px",marginTop:"18px",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"8px 20px",background:"none",border:"1px solid #3a2e1e",
            color:"#a07830",cursor:"pointer",fontSize:"13px",letterSpacing:"1px"}}>キャンセル</button>
          <button onClick={()=>canSave&&onSave(form)} style={{padding:"8px 24px",
            background:canSave?"linear-gradient(135deg,#8a6520,#c9a84c)":"#2a2010",
            border:"none",color:canSave?"#1a1008":"#4a3820",
            cursor:canSave?"pointer":"not-allowed",fontSize:"13px",letterSpacing:"1px",fontWeight:"700"}}>保存する</button>
        </div>
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [shows, setShows] = useState([]);
  const [view, setView] = useState("upcoming");
  const [modal, setModal] = useState(null);
  const [filter, setFilter] = useState("全て");
  const [calMonth, setCalMonth] = useState(new Date());
  const [selectedActor, setSelectedActor] = useState(null);
  const [displayMode, setDisplayMode] = useState("list");
  const [showImport, setShowImport] = useState(false);
  const [statsTab, setStatsTab] = useState("title");

  useEffect(()=>{
    try { const s=localStorage.getItem(STORAGE_KEY); if(s) setShows(JSON.parse(s)); } catch(e){}
  },[]);

  const backup = () => {
    const json = JSON.stringify(shows, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `観劇帖_backup_${date}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const restore = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        if (window.confirm(`${data.length}件の記録を復元します。現在のデータは上書きされます。よろしいですか？`)) {
          persist(data);
          alert("復元しました！");
        }
      } catch {
        alert("ファイルの形式が正しくありません。");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const persist = arr => {
    setShows(arr);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e){}
  };

  const handleSave = form => {
    if(modal==="new"||!form.id) persist([...shows,{...form,id:Date.now()}]);
    else persist(shows.map(s=>s.id===form.id?form:s));
    setModal(null);
  };
  const handleDelete = id => { if(window.confirm("この公演を削除しますか？")) persist(shows.filter(s=>s.id!==id)); };
  const handleDuplicate = show => {
    setModal({...show,id:null,date:"",time:"",seatFloor:"",seatRow:"",seatBlock:"",seatNum:"",rating:0,memo:""});
  };
  const selectActor = name => { setSelectedActor(name); setView("actor"); };

  const today = new Date(new Date().toDateString());
  const upcoming = shows.filter(s=>new Date(s.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const past = shows.filter(s=>new Date(s.date)<today).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const genres = ["全て",...GENRES.filter(g=>shows.some(s=>s.genre===g))];
  const filtered = list => filter==="全て"?list:list.filter(s=>s.genre===filter);

  const yr=calMonth.getFullYear(), mo=calMonth.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate();
  const calDays=Array.from({length:firstDay+dim},(_,i)=>i>=firstDay?i-firstDay+1:null);
  const inMonth=shows.filter(s=>{const d=new Date(s.date);return d.getFullYear()===yr&&d.getMonth()===mo;});

  const actorData = selectedActor ? (()=>{
    const all=shows.filter(s=>(s.castTags||[]).includes(selectedActor));
    const pastS=all.filter(s=>new Date(s.date)<today);
    const upS=all.filter(s=>new Date(s.date)>=today);
    const rated=pastS.filter(s=>s.rating>0);
    const avg=rated.length>0?(rated.reduce((a,s)=>a+s.rating,0)/rated.length).toFixed(1):null;
    return {all:all.sort((a,b)=>new Date(b.date)-new Date(a.date)),pastS,upS,avg};
  })():null;

  const tabStyle = active => ({
    padding:"6px 0",textAlign:"center",cursor:"pointer",
    background:active?"linear-gradient(135deg,#8a6520,#c9a84c)":"none",
    border:active?"none":"1px solid #2a2010",
    color:active?"#1a1008":"#b08838",fontSize:"13px",letterSpacing:"1px",
  });

  const empty = (msg,icon) => (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#3a2e1e",fontSize:"14px",letterSpacing:"2px"}}>
      <div style={{fontSize:"32px",marginBottom:"12px"}}>{icon}</div>{msg}
    </div>
  );

  const showList = (list) => (
    <div style={displayMode==="card"
      ?{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"10px"}
      :{display:"grid",gap:"0"}}>
      {list.map(s=>(
        <ShowCard key={s.id} show={s} onEdit={setModal} onDelete={handleDelete}
          onActorClick={selectActor} onDuplicate={handleDuplicate} cardMode={displayMode==="card"}/>
      ))}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at top,#1a1005 0%,#0d0900 60%)"}}>

      <header style={{borderBottom:"1px solid #2a2010",padding:"10px 16px 0",
        background:"linear-gradient(180deg,#0d0900,#110d02)",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:"800px",margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:"7px"}}>
              <h1 style={{margin:0,fontSize:"20px",letterSpacing:"3px",fontWeight:"700",fontStyle:"italic",
                color:"#e8c55a"}}>観劇帖</h1>
              <span style={{fontSize:"9px",letterSpacing:"2px",color:"#886018"}}>JOURNAL</span>
            </div>
            <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
              <button onClick={()=>setModal("new")} style={{padding:"5px 14px",
                background:"linear-gradient(135deg,#8a6520,#c9a84c)",border:"none",color:"#1a1008",
                cursor:"pointer",fontSize:"13px",letterSpacing:"1px",fontWeight:"700"}}>＋ 追加</button>
              <button onClick={backup} title="バックアップをダウンロード" style={{padding:"5px 10px",
                background:"none",border:"1px solid #3a2e1e",color:"#906820",cursor:"pointer",fontSize:"13px"}}>💾</button>
              <label title="バックアップから復元" style={{padding:"5px 10px",
                border:"1px solid #3a2e1e",color:"#906820",cursor:"pointer",fontSize:"13px",display:"inline-block"}}>
                📂<input type="file" accept=".json" onChange={restore} style={{display:"none"}}/>
              </label>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"4px",paddingBottom:"10px"}}>
            {[["upcoming","予定"],["past","鑑賞済"],["calendar","暦"],["actor","役者"],["stats","統計"]].map(([k,l])=>(
              <button key={k} onClick={()=>{setView(k);if(k!=="actor")setSelectedActor(null);}}
                style={tabStyle(view===k)}>{l}</button>
            ))}
          </div>
        </div>
      </header>

      <main style={{maxWidth:"800px",margin:"0 auto",padding:"16px"}}>

        {view!=="calendar"&&view!=="actor"&&view!=="stats"&&(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px",marginBottom:"14px"}}>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              {genres.length>1&&genres.map(g=>(
                <button key={g} onClick={()=>setFilter(g)} style={{padding:"3px 12px",
                  background:filter===g?"#3a2a10":"none",border:`1px solid ${filter===g?"#8a6520":"#2a2010"}`,
                  color:filter===g?"#e8c55a":"#b08838",cursor:"pointer",fontSize:"12px",letterSpacing:"1px"}}>{g}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:"4px"}}>
              {[["list","☰"],["card","⊞"]].map(([m,icon])=>(
                <button key={m} onClick={()=>setDisplayMode(m)} style={{padding:"3px 10px",
                  background:displayMode===m?"#3a2a10":"none",border:`1px solid ${displayMode===m?"#8a6520":"#2a2010"}`,
                  color:displayMode===m?"#e8c55a":"#906820",cursor:"pointer",fontSize:"13px"}}>{icon}</button>
              ))}
            </div>
          </div>
        )}

        {view==="upcoming"&&(filtered(upcoming).length===0?empty("予定している公演はありません","🎭"):showList(filtered(upcoming)))}
        {view==="past"&&(filtered(past).length===0?empty("鑑賞済みの記録はありません","📖"):showList(filtered(past)))}

        {view==="actor"&&(
          <div>
            {!selectedActor?(
              <div>
                <p style={{margin:"0 0 16px",fontSize:"12px",color:"#b08838",letterSpacing:"2px",textTransform:"uppercase"}}>役者を選んで鑑賞履歴を確認</p>
                {collectActors(shows).length===0?empty("公演に役者を登録するとここに表示されます","🎭"):(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
                    {collectActors(shows)
                      .map(name=>({name,cnt:shows.filter(s=>(s.castTags||[]).includes(name)).length}))
                      .sort((a,b)=>b.cnt-a.cnt)
                      .map(({name,cnt})=>(
                        <button key={name} onClick={()=>setSelectedActor(name)}
                          style={{padding:"7px 10px",background:"#1e1608",border:"1px solid #3a2e1e",
                            color:"#e8c55a",cursor:"pointer",fontSize:"14px",textAlign:"left",
                            display:"flex",alignItems:"center",justifyContent:"space-between",gap:"6px",minWidth:0}}>
                          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{name}</span>
                          <span style={{fontSize:"10px",color:"#a07830",background:"#110d05",
                            padding:"1px 6px",borderRadius:"8px",fontFamily:"monospace",flexShrink:0}}>{cnt}</span>
                        </button>
                      ))}
                  </div>
                )}
              </div>
            ):(
              <div>
                <button onClick={()=>setSelectedActor(null)} style={{background:"none",border:"1px solid #3a2e1e",
                  color:"#c4a84a",cursor:"pointer",padding:"5px 14px",fontSize:"13px",letterSpacing:"1px",marginBottom:"20px"}}>‹ 役者一覧</button>
                <div style={{marginBottom:"20px",paddingBottom:"16px",borderBottom:"1px solid #3a2810"}}>
                  <p style={{margin:"0 0 2px",fontSize:"10px",letterSpacing:"4px",color:"#906820"}}>ACTOR</p>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                      <div style={{position:"relative",flexShrink:0}}>
                        <ActorPhoto name={selectedActor}/>
                      </div>
                      <div>
                        <h2 style={{margin:0,fontSize:"26px",fontWeight:"700",fontStyle:"italic",color:"#e8d5a0",letterSpacing:"2px"}}>{selectedActor}</h2>
                        {actorData&&(
                          <div style={{fontSize:"13px",color:"#b08838",letterSpacing:"1px",marginTop:"4px"}}>
                            <span>鑑賞済 {actorData.pastS.length}本</span>
                            {actorData.upS.length>0&&<span style={{color:"#c8a848",marginLeft:"10px"}}>予定 {actorData.upS.length}本</span>}
                          </div>
                        )}
                        {actorData?.avg&&<div style={{fontSize:"14px",color:"#e8c55a",marginTop:"2px"}}>平均 ★{actorData.avg}</div>}
                      </div>
                    </div>
                  </div>
                </div>
                <div style={{display:"grid",gap:"0"}}>
                  {(actorData?.all||[]).map(s=>(
                    <ShowCard key={s.id} show={s} onEdit={setModal} onDelete={handleDelete}
                      onActorClick={selectActor} onDuplicate={handleDuplicate} cardMode={false}/>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {view==="calendar"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
              <button onClick={()=>setCalMonth(new Date(yr,mo-1))} style={{background:"none",border:"1px solid #3a2e1e",color:"#c4a84a",cursor:"pointer",padding:"4px 12px",fontSize:"16px"}}>‹</button>
              <h2 style={{margin:0,fontSize:"18px",letterSpacing:"3px",color:"#e8c55a"}}>{yr}年 {mo+1}月</h2>
              <button onClick={()=>setCalMonth(new Date(yr,mo+1))} style={{background:"none",border:"1px solid #3a2e1e",color:"#c4a84a",cursor:"pointer",padding:"4px 12px",fontSize:"16px"}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"2px"}}>
              {["日","月","火","水","木","金","土"].map((d,i)=>(
                <div key={d} style={{textAlign:"center",fontSize:"10px",
                  color:i===0?"#c05050":i===6?"#4070b0":"#c0a060",padding:"6px 0",fontWeight:"600"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px"}}>
              {calDays.map((day,i)=>{
                if(!day) return <div key={`e-${i}`}/>;
                const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                const ds2=inMonth.filter(s=>s.date===ds);
                const now=new Date(); const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`; const isT=ds===todayStr;
                const dow=(firstDay+day-1)%7;
                return (
                  <div key={day} style={{background:isT?"rgba(201,168,76,0.1)":"rgba(255,255,255,0.02)",
                    border:isT?"1px solid #c9a84c":"1px solid #1e1808",minHeight:"60px",padding:"4px",
                    minWidth:0,overflow:"hidden"}}>
                    <span style={{fontSize:"13px",fontWeight:"700",color:isT?"#e8c55a":dow===0?"#c05050":dow===6?"#4070b0":"#c8a84a"}}>{day}</span>
                    <div style={{marginTop:"2px",display:"flex",flexDirection:"column",gap:"1px"}}>
                      {ds2.map(s=>{
                        const et=EVENT_TYPES[s.eventType||"show"];
                        return (
                          <div key={s.id} onClick={()=>setModal(s)} title={`[${et.label}] ${s.title}`}
                            style={{fontSize:"14px",background:et.bg,color:et.color,padding:"0 2px",
                              cursor:"pointer",borderLeft:`2px solid ${et.color}`,
                              textAlign:"center",lineHeight:"1.4",overflow:"hidden"}}>
                            {getShowEmoji(s.title)}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {view==="stats"&&(()=>{
          const pastOnly=shows.filter(s=>new Date(s.date)<today&&(s.eventType||"show")==="show");
          const titleMap={};
          pastOnly.forEach(s=>{
            if(!titleMap[s.title]) titleMap[s.title]={count:0,ratings:[]};
            titleMap[s.title].count++;
            if(s.rating>0) titleMap[s.title].ratings.push(s.rating);
          });
          const titleStats=Object.entries(titleMap).sort((a,b)=>b[1].count-a[1].count);
          const yearMap={};
          pastOnly.forEach(s=>{
            const y=s.date.slice(0,4);
            if(!yearMap[y]) yearMap[y]=[];
            yearMap[y].push(s);
          });
          const years=Object.keys(yearMap).sort((a,b)=>b-a);
          return (
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"16px"}}>
                {[["title","演目別"],["year","年別"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setStatsTab(k)} style={tabStyle(statsTab===k)}>{l}</button>
                ))}
              </div>
              {statsTab==="title"&&(
                <div style={{display:"grid",gap:"4px"}}>
                  {titleStats.map(([title,stat])=>{
                    const avg=stat.ratings.length>0?(stat.ratings.reduce((a,b)=>a+b,0)/stat.ratings.length).toFixed(1):null;
                    return (
                      <div key={title} style={{display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",
                        background:"#161008",border:"1px solid #2a2010",minWidth:0,
                        borderLeft:`3px solid ${stat.count>=10?"#e8c55a":stat.count>=5?"#c0a045":"#6a5020"}`}}>
                        <span style={{fontSize:"14px",color:"#f0d870",fontWeight:"700",flex:1,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</span>
                        {avg&&<span style={{fontSize:"11px",color:"#b08838",flexShrink:0}}>★{avg}</span>}
                        <span style={{fontSize:"16px",color:"#e8c55a",fontWeight:"700",flexShrink:0,minWidth:"3em",textAlign:"right"}}>
                          {stat.count}<span style={{fontSize:"10px",color:"#906820",marginLeft:"1px"}}>回</span>
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
              {statsTab==="year"&&(
                <div style={{display:"grid",gap:"20px"}}>
                  {years.map(year=>{
                    const ys=yearMap[year].sort((a,b)=>new Date(b.date)-new Date(a.date));
                    return (
                      <div key={year}>
                        <div style={{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"8px",
                          paddingBottom:"6px",borderBottom:"1px solid #2a2010"}}>
                          <span style={{fontSize:"20px",color:"#e8c55a",fontWeight:"700",letterSpacing:"2px"}}>{year}</span>
                          <span style={{fontSize:"12px",color:"#906820"}}>{ys.length}本</span>
                        </div>
                        <div style={{display:"grid",gap:"0"}}>
                          {ys.map(s=>{
                            const venue=s.venueType==="shiki"?s.venueShiki:s.venueOther;
                            return (
                              <div key={s.id} style={{display:"flex",alignItems:"baseline",gap:"8px",
                                padding:"5px 8px",borderBottom:"1px solid #1a1408",minWidth:0}}>
                                <span style={{fontSize:"14px",color:"#c8a850",flexShrink:0,fontWeight:"700",letterSpacing:"1px"}}>{s.date.slice(5).replace("-","–")}</span>
                                <span style={{fontSize:"14px",color:"#f0dc90",fontWeight:"700",flex:1,
                                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.title}</span>
                                {venue&&<span style={{fontSize:"11px",color:"#9a7840",flexShrink:0,whiteSpace:"nowrap"}}>{venue}</span>}
                                {s.rating>0&&<span style={{fontSize:"10px",color:"#c0a040",flexShrink:0}}>★{s.rating}</span>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}

      </main>

      <div id="copy-toast" style={{position:"fixed",bottom:"30px",left:"50%",transform:"translateX(-50%)",
        background:"#2a3a20",color:"#70e870",padding:"8px 20px",borderRadius:"20px",fontSize:"13px",
        opacity:"0",transition:"opacity 0.3s",pointerEvents:"none",zIndex:2000,border:"1px solid #206020"}}>
        コピーしました
      </div>

      {showImport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",
          alignItems:"center",justifyContent:"center",zIndex:1000,padding:"16px"}}
          onClick={e=>e.target===e.currentTarget&&setShowImport(false)}>
          <div style={{background:"linear-gradient(160deg,#1a1408,#221808)",border:"1px solid #5a4520",
            borderRadius:"4px",padding:"24px",width:"100%",maxWidth:"480px",boxShadow:"0 20px 60px rgba(0,0,0,0.8)"}}>
            <h2 style={{margin:"0 0 12px",fontSize:"18px",color:"#e8c55a",letterSpacing:"2px"}}>過去の記録をインポート</h2>
            <p style={{fontSize:"12px",color:"#906820",letterSpacing:"1px",lineHeight:1.7,marginBottom:"16px"}}>
              100件の観劇記録が見つかりました。<br/>既存のデータに追加されます。
            </p>
            <div style={{background:"#110d05",border:"1px solid #2a2010",padding:"10px",
              maxHeight:"160px",overflowY:"auto",marginBottom:"16px",fontSize:"11px",color:"#7a6030"}}>
              {IMPORT_DATA.slice(0,5).map((s,i)=>(
                <div key={i} style={{padding:"3px 0",borderBottom:"1px solid #1a1508"}}>
                  {s.date} {s.time} 『{s.title}』
                </div>
              ))}
              <div style={{padding:"4px 0",color:"#5a4020"}}>… 他 {IMPORT_DATA.length-5} 件</div>
            </div>
            <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
              <button onClick={()=>setShowImport(false)} style={{padding:"8px 20px",background:"none",
                border:"1px solid #3a2e1e",color:"#906820",cursor:"pointer",fontSize:"13px"}}>キャンセル</button>
              <button onClick={()=>{
                persist([...shows,...IMPORT_DATA.map((s,i)=>({...s,id:Date.now()+i}))]);
                setShowImport(false);
              }} style={{padding:"8px 24px",background:"linear-gradient(135deg,#8a6520,#c9a84c)",
                border:"none",color:"#1a1008",cursor:"pointer",fontSize:"13px",fontWeight:"700"}}>
                {IMPORT_DATA.length}件をインポート
              </button>
            </div>
          </div>
        </div>
      )}

      {modal&&<Modal show={modal==="new"?null:modal} onClose={()=>setModal(null)} onSave={handleSave}
        allActors={collectActors(shows)}
        allTitles={Object.assign([...new Set(shows.map(s=>s.title).filter(Boolean))].sort(),
          {__venues:[...new Set(shows.filter(s=>s.venueType==="other").map(s=>s.venueOther).filter(Boolean))].sort()}
        )}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
